        <div style="font-size:12.5px;color:#a0aec0;line-height:1.6;margin-bottom:6px">${cd.patient.complaint}</div>
        <div style="font-size:12.5px;color:#718096;line-height:1.6">${cd.patient.exam}</div>
      </div>
    </div>`;
}

function buildCultureHtml() {
  if (!gs.cultureResults || gs.cultureResults.length === 0) return '';
  const cid = currentBedCid();
  const open = gs._cultureOpen !== false;
  const rows = gs.cultureResults.map(c => {
    const statusTag = c.status === 'final'
      ? '<span style="font-size:9px;color:#68d391;background:rgba(104,211,145,.1);border:1px solid rgba(104,211,145,.3);padding:1px 5px;border-radius:3px">Final</span>'

    return `<div style="padding:6px 0;border-top:1px solid #1e2533">
      <div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:3px">
        <span style="font-size:11px;font-weight:600;color:#e2e8f0">${c.source}</span>
        <span style="font-size:10px;color:#4a5568">Day ${c.day} ${statusTag}</span>

      <div style="font-size:11px;color:#a0aec0;line-height:1.5">${c.detail}</div>

  }).join('');
  return `
    <div class="log-wrap">
      <button class="log-toggle" onclick="toggleCulture('${cid}')">

        <div class="score-card"><div class="sc-label">總收益</div><div class="sc-value">NT$${totals.revenue.toLocaleString()}</div></div>
        <div class="score-card"><div class="sc-label">總支出</div><div class="sc-value">NT$${totals.expense.toLocaleString()}</div></div>
        <div class="score-card"><div class="sc-label">淨損益</div><div class="sc-value ${netCls}">${netSign}NT$${Math.abs(totals.net).toLocaleString()}</div></div>
        <div class="score-card"><div class="sc-label">累計評分</div><div class="sc-value ${totals.totalScore >= 0 ? 'profit' : 'loss'}">${totals.totalScore >= 0 ? '+' : ''}${totals.totalScore}</div></div>
      </div>
      <div class="dec-log">
        <div class="dec-log-title">案例結算明細</div>
        ${game.archive.map(a => {
          const sign = a.net >= 0 ? '+' : '';
          const cls = a.net >= 0 ? 'good' : 'bad';
          const scoreSign = a.drugScore >= 0 ? '+' : '';
          const scoreCls = a.drugScore >= 0 ? 'good' : 'bad';
          return `<div class="dec-row">
            <span class="dec-label">${a.caseTitle}（Day ${a.admittedOn}–${a.dischargedOn}）· ${a.outcomeText}</span>
            <span class="dec-value"><span class="${cls}">${sign}NT$${Math.abs(a.net).toLocaleString()}</span> · <span class="${scoreCls}">${scoreSign}${a.drugScore}</span></span>
          </div>`;
        }).join('')}
      </div>
      <div style="font-size:11px;color:#4a5568;text-transform:uppercase;letter-spacing:1px;margin:14px 0 8px">教學回饋 + 事件記錄</div>
      ${game.archive.map((a, idx) => {
        const open = !!game._archiveFbOpen[idx];
        const logOpen = !!game._archiveLogOpen?.[idx];
        const log = a.log || [];
        const byDay = {};
        log.forEach(e => { (byDay[e.day] ||= []).push(e); });
        const days = Object.keys(byDay).map(Number).sort((a,b)=>b-a);
        const logHtml = days.map(d =>
          `<div class="log-day-header">Day ${d}</div>` +
          byDay[d].map(e =>
            `<div class="log-entry ${e.type}">
              <div class="log-entry-dot"></div>
              <div class="log-entry-text">${e.text}</div>
            </div>`).join('')
        ).join('');
        return `<div style="margin-bottom:18px">
          <div style="font-size:11px;color:#4299e1;font-weight:600;margin-bottom:6px;letter-spacing:.3px">${a.caseTitle} — ${a.caseSubtitle}</div>
          <div class="feedback-wrap" style="margin-bottom:4px">
            <button class="feedback-toggle" onclick="toggleArchiveFb(${idx})">
              教學回饋 <span>${open ? '▲' : '▼'}</span>
            </button>
            <div class="fb-content ${open ? 'open' : ''}">
              ${(a.teachingPoints || []).map(tp =>
                `<div class="fb-item"><div class="fb-title">${tp.title}</div><div class="fb-body">${tp.body}</div></div>`
              ).join('')}
            </div>
          </div>
          <div class="log-wrap">
            <button class="log-toggle" onclick="toggleArchiveLog(${idx})">
              <span>事件記錄（${log.length} 筆）</span>
              <span>${logOpen ? '▲' : '▼'}</span>
            </button>
            <div class="log-content ${logOpen ? 'open' : ''}">${logHtml}</div>
          </div>
        </div>`;
      }).join('')}
      <button class="restart-btn" style="margin-top:10px" onclick="resetGame()">重新開始 →</button>
    </div>`;
}

window.toggleArchiveLog = function(idx) {
  if (!game._archiveLogOpen) game._archiveLogOpen = {};
  game._archiveLogOpen[idx] = !game._archiveLogOpen[idx];
  renderGame();
};

window.toggleArchiveFb = function(idx) {
  if (!game._archiveFbOpen) game._archiveFbOpen = {};
  game._archiveFbOpen[idx] = !game._archiveFbOpen[idx];
  renderGame();
};

window.finalSummary = function() { renderGame(); };

function buildDecisionHtml(dp) {
  const scene = dp.buildScene();
  const keysA = ['A','B','C','D','E','F','G','H'];
  const alertClass = scene.tagAlert ? 'alert-border' : '';
  const tagClass   = scene.tagAlert ? 'alert' : '';

  let choicesHtml;
  if (scene.type === 'drug-combo') {
    choicesHtml = buildDrugComboHtml(dp, scene);
  } else if (scene.multiSelect) {
    const cid = currentBedCid();
    const selSet = gs._pendingMultiSel = gs._pendingMultiSel || new Set();
    choicesHtml = `<div class="choice-group">
      ${scene.options.map(o => {
        const checked = selSet.has(o.key);
        return `<div class="checkbox-btn${checked?' checked':''}" onclick="toggleMulti('${cid}','${o.key}',this)">
          <div class="cb-box">${checked?'✓':''}</div>
          <div>${o.label}</div>
        </div>`;
      }).join('')}
    </div>
    <button class="action-btn" onclick="confirmMulti('${cid}','${dp.id}')">確認選擇 →</button>`;
  } else {
    const cid = currentBedCid();
    choicesHtml = `<div class="choice-group">
      ${scene.options.map((o, i) =>
        `<div class="choice-btn" onclick="pickChoice('${cid}','${dp.id}','${o.key}',this)">
          <div class="choice-key">${keysA[i]}</div>
          <div>${o.label}</div>
        </div>`).join('')}
    </div>`;
  }

  return `
    <div class="decision-card ${alertClass}">
      <div class="decision-day-tag ${tagClass}">${scene.tag}</div>
      <div class="decision-title">${scene.title}</div>
      <div class="decision-body">${scene.bodyHtml}</div>
      ${choicesHtml}
    </div>`;
}

function buildLogHtml() {
  const cid = currentBedCid();
  const open = gs._logOpen;
  const byDay = {};
  gs.log.forEach(e => { if (!byDay[e.day]) byDay[e.day] = []; byDay[e.day].push(e); });
  const days = Object.keys(byDay).map(Number).sort((a,b)=>b-a);
  const entries = days.map(d =>
    `<div class="log-day-header">Day ${d}</div>` +
    byDay[d].map(e =>
      `<div class="log-entry ${e.type}">
        <div class="log-entry-dot"></div>
        <div class="log-entry-text">${e.text}</div>
      </div>`).join('')
  ).join('');
  const count = gs.log.length;
  return `
    <div class="log-wrap">
      <button class="log-toggle" onclick="toggleLog('${cid}')">
        <span>事件記錄（${count} 筆）</span>
        <span>${open ? '▲' : '▼'}</span>

      <div class="log-content ${open ? 'open' : ''}">${entries}</div>

}

// ─── OUTCOME COLUMN ───────────────────────────────────────────────────────────
function renderOutcomeColumn() {
  const cd = gs.caseDef;
  const drugScore = calcDrugScore();
  const { net, bedCost, revenue, isOPAT } = calcPnL();
  const pnlSign  = net >= 0 ? '+' : '';
  const pnlClass = net >= 0 ? 'profit' : 'loss';
  const grandTotal = gs.totalCost + bedCost;
  const hasComp = gs.complications.length > 0;
  const isICU = gs.icuPath;

  let outcomeText, outcomeClass;
  if (isICU) { outcomeText = '插管 / ICU 住院'; outcomeClass = 'bad'; }
  else if (hasComp) { outcomeText = '治療完成（有併發症）'; outcomeClass = 'ok'; }
  else { outcomeText = '順利出院'; outcomeClass = 'good'; }

  const hospNote = isOPAT ? `OPAT ${gs.opatDays} 天`
    : isICU ? `ICU 路徑，${gs.hospitalDays} 天`
    : `全程留院`;
  const totalHosp = isOPAT ? 7 : gs.hospitalDays;

  const decLog = buildDecLogRows();
  const cid = currentBedCid();

  return `
    <div class="case-panel">
      ${buildCaseHeaderHtml(true, `<span class="status-badge done">完成</span>`)}
      <div class="outcome-col">
        <div class="outcome-result-sm ${outcomeClass}">${outcomeText}</div>
        <div class="score-grid-2">
          <div class="score-card">
            <div class="sc-label">住院天數</div>
            <div class="sc-value">${totalHosp} 天</div>
            <div class="sc-note">${hospNote}</div>
          </div>
          <div class="score-card">
            <div class="sc-label">總費用</div>
            <div class="sc-value">NT$${grandTotal.toLocaleString()}</div>
            <div class="sc-note">藥費 NT$${gs.totalCost.toLocaleString()} + 床費 NT$${bedCost.toLocaleString()}</div>
          </div>
          <div class="score-card">
            <div class="sc-label">損益</div>
            <div class="sc-value ${pnlClass}">${pnlSign}NT$${Math.abs(net).toLocaleString()}</div>
            <div class="sc-note">定額給付 NT$${revenue.toLocaleString()}${isOPAT ? ` + 補助 NT$${cd.opatSubsidy.toLocaleString()}` : ''}</div>
          </div>
          <div class="score-card">
            <div class="sc-label">本案評分</div>
            <div class="sc-value ${drugScore >= 0 ? 'profit' : 'loss'}">${drugScore >= 0 ? '+' : ''}${drugScore}</div>
            <div class="sc-note">${drugScore >= 0 ? '加分' : '失分'}</div>
          </div>
        </div>
        <div class="dec-log">
          <div class="dec-log-title">決策記錄</div>
          ${decLog.map(r => `<div class="dec-row"><span class="dec-label">${r.label}</span><span class="dec-value ${r.cls}">${r.value}</span></div>`).join('')}
        </div>
        <div class="feedback-wrap">
          <button class="feedback-toggle" onclick="toggleFb('${cid}')">
            教學回饋 <span id="fbarr-${cid}">${gs._fbOpen?'▲':'▼'}</span>
          </button>
          <div class="fb-content ${gs._fbOpen?'open':''}" id="fbcontent-${cid}">
            ${cd.teachingPoints.map(tp =>
              `<div class="fb-item"><div class="fb-title">${tp.title}</div><div class="fb-body">${tp.body}</div></div>`
            ).join('')}
          </div>
        </div>
        ${buildLogHtml()}
      </div>
    </div>`;
}

// ─── EVENT HANDLERS ───────────────────────────────────────────────────────────
function bedByCid(cid) {
  // cid is "bed-<idx>" in new model
  const idx = parseInt(cid.replace('bed-',''), 10);
  return game.beds[idx];
}

function maybeDischarge(bed) {
  if (!bed.gameOver) return;
  if (bed.status === 'dischargedShowing' || bed.status === 'recovering') return;
  if ((bed.dischargeDelay || 0) > 0) {
    bed.status = 'recovering';
    // dischargedOnDay set when delay reaches 0 in advanceGlobalDay
  } else {
    bed.status = 'dischargedShowing';
    bed.dischargedOnDay = game.globalDay;
    pushOutcomeNotification(bed);
  }
}

window.toggleDay0Test = function(cid, key) {
  const state = bedByCid(cid); if (!state) return;
  const p = state.day0Pending.tests;
  if (p.has(key)) p.delete(key); else p.add(key);
  renderGame();
};

window.pickDay0Drug = function(cid, val) {
  const state = bedByCid(cid); if (!state) return;
  state.day0Pending.drug = val || null;
  renderGame();
};

window.pickDay0Adjunct = function(cid, val) {
  const state = bedByCid(cid); if (!state) return;
  state.day0Pending.adjunct = val || null;
  renderGame();
};

window.confirmDay0 = function(cid) {
  const state = bedByCid(cid); if (!state) return;
  withState(state, () => {
    const { tests, drug } = state.day0Pending;
    if (!drug) return;
    tests.forEach(key => {
      const t = gs.caseDef.initialTests.find(x => x.key === key);
      if (!t) return;
      addCost(t.cost);
      gs.orderedTests.add(key);
    });
    if (gs.caseDef.id === 'case-01') {
      if (tests.has('xRay')) addLog('result', 'X 光：軟組織腫脹，無骨質侵蝕。', 0);
      if (tests.has('ct'))   addLog('result', 'CT：蜂窩組織炎，無壞死性筋膜炎，無深部膿瘍。', 0);
      if (tests.has('bloodCulture')) addLog('result', '血液培養 × 2 套已送出，等待初步結果（48h）。', 0);
    } else if (gs.caseDef.id === 'case-02') {
      if (tests.has('cxr'))     addLog('result', 'CXR：右下肺葉合併（consolidation），符合肺炎表現。', 0);
      if (tests.has('ctChest')) addLog('result', 'CT 胸部：右下肺炎，多葉浸潤，輕度肋膜積液。', 0);
      if (tests.has('bloodCulture')) addLog('result', '血液培養 × 2 套已送出，等待初步結果。', 0);
      if (tests.has('sputumCulture')) addLog('result', '痰液培養已送出，結果約 72h（Day 3）回報。', 0);
      addLog('result', '尿液培養（急診已送）：GNB 生長，最終鑑定與藥敏待回（預計 Day 2）。', 0);
    } else if (gs.caseDef.id === 'case-03') {
      if (tests.has('ctAbd')) addLog('result', 'CT 腹部：右腎實質與腎周脂肪間隙有氣體訊號，確診 Class 3A Emphysematous Pyelonephritis。', 0);
      if (tests.has('renalUS')) addLog('result', '腎臟超音波：右腎腫脹 + gas shadow，強烈懷疑 EP（未分類）。', 0);
      if (tests.has('bloodCulture')) addLog('result', '血液培養 × 2 套已送出，等待初步結果（48h）。', 0);
      if (tests.has('urineCulture')) addLog('result', '尿液培養已送出，初步 ID 預計 Day 2 回報。', 0);
    } else if (gs.caseDef.id === 'case-04') {
      if (tests.has('bloodCulture')) addLog('result', '血液培養 × 2 套已送出，等待初步結果（48h）。', 0);
      if (tests.has('sputumCulture')) addLog('result', '痰液培養已送出，結果預計 Day 2 回報。', 0);
      if (tests.has('fluPCR')) addLog('result', 'Influenza A/B PCR 已送出，結果預計 Day 1 回報。', 0);
      if (tests.has('filmArray')) addLog('result', 'FilmArray Respiratory Panel 已送出，結果預計 Day 1 回報（2–4 小時）。', 0);
      if (tests.has('mycoPCR')) addLog('result', 'Mycoplasma PCR 已送出，結果預計 Day 1 回報。', 0);
      if (tests.has('legionellaAg')) addLog('result', 'Legionella urinary antigen：陰性。', 0);
      if (tests.has('strepAg')) addLog('result', 'Streptococcus pneumoniae urinary antigen：陰性。', 0);
      if (tests.has('hrct')) addLog('result', 'HRCT 胸部：雙下肺多灶性磨玻璃結節合併小範圍 consolidation，無膿瘍、無胸腔積液。', 0);
      if (tests.has('pct')) addLog('result', 'Procalcitonin 系列追蹤已啟動，每日測量。', 0);
    } else if (gs.caseDef.id === 'case-05') {
      if (tests.has('bloodCulture')) addLog('result', '血液培養 × 2 套已送出，等待初步結果（48h）。', 0);
      if (tests.has('urineCultureRpt')) addLog('result', '重複尿液培養已送出，48h 報告。', 0);
      if (tests.has('mri')) addLog('result', 'MRI L-spine 已安排，結果預計 Day 1 回報。', 0);
      if (tests.has('gallium')) addLog('result', 'Gallium scan 已安排，結果預計 Day 2 回報。', 0);
      if (tests.has('tte')) addLog('result', 'TTE 已安排，結果預計 Day 1 回報。', 0);
      if (tests.has('lspineXray')) addLog('result', 'L-spine X-ray 已執行，結果即時回報於 Day 1。', 0);
      if (tests.has('ctSpine')) addLog('result', 'CT spine 已安排，結果預計 Day 1 回報。', 0);
      if (tests.has('esrCrp')) addLog('result', 'ESR / CRP baseline 已啟動，將每 3 天追蹤。', 0);
      if (tests.has('hba1c')) addLog('result', 'HbA1c 已送出，結果預計 Day 1。', 0);
    }
    gs.currentDrug = drug;
    gs.decisions['empiric'] = drug;
    addCost(DRUGS[drug].dailyCost);
    // Case 03 adjunct drug
    if (gs.caseDef.id === 'case-03' && state.day0Pending.adjunct) {
      gs.c03AdjunctDrug = state.day0Pending.adjunct;
      gs.decisions['empiric-adjunct'] = state.day0Pending.adjunct;
      addCost(DRUGS[gs.c03AdjunctDrug].dailyCost);
      addLog('drug-change', `加用 ${DRUGS[gs.c03AdjunctDrug].label} 作為 ${gs.c03AdjunctDrug === 'vancomycin' ? 'MRSA / Enterococcus' : 'Enterococcus'} 輔助覆蓋。`, 0);
    }
    gs.hospitalDays = 1;
    addLog('drug-change', `開立 ${DRUGS[drug].label}，Empiric 治療開始。`, 0);
    gs.day0Confirmed = true;
    gs.day = 0;
    gs.status = 'active';
  });
  saveGame();
  renderGame();
};

window.pickChoice = function(cid, decId, key) {
  const state = bedByCid(cid); if (!state) return;
  withState(state, () => {
    gs.caseDef.decisions[decId].onChoice(key);
  });
  maybeDischarge(state);
  saveGame();
  renderGame();
};

window.confirmMulti = function(cid, decId) {
  const state = bedByCid(cid); if (!state) return;
  withState(state, () => {
    const keys = [...(state._pendingMultiSel || new Set())];
    state._pendingMultiSel = new Set();
    gs.caseDef.decisions[decId].onChoice(keys);
  });
  maybeDischarge(state);
  saveGame();
  renderGame();
};

window.toggleLog = function(cid) {
  const state = bedByCid(cid); if (!state) return;
  state._logOpen = !state._logOpen;
  renderGame();
};

window.toggleFb = function(cid) {
  const state = bedByCid(cid); if (!state) return;
  state._fbOpen = !state._fbOpen;
  renderGame();
};

window.pickDay2Gpc = function(cid, val) {
  const state = bedByCid(cid); if (!state) return;
  state._day2GpcSel = val;
  renderGame();
};

window.pickDay2Gnb = function(cid, val) {
  const state = bedByCid(cid); if (!state) return;
  state._day2GnbSel = val;
  renderGame();
};

window.confirmDay2Combo = function(cid, decId) {
  const state = bedByCid(cid); if (!state) return;
  withState(state, () => {
    const gpc = state._day2GpcSel || '';
    const gnb = state._day2GnbSel || '';
    gs.caseDef.decisions[decId].onChoice({ gpc, gnb });
    state._day2GpcSel = null;
    state._day2GnbSel = null;
  });
  maybeDischarge(state);
  saveGame();
  renderGame();
};

// ─── INIT ─────────────────────────────────────────────────────────────────────
renderIntro();
</script>
